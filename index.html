<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VF-CB | Vintage Figures Chat Bot</title>

  <style>
    :root {
      --bg: #08090d;
      --panel: #11131b;
      --panel2: #191c27;
      --line: rgba(255,255,255,0.10);
      --text: #f2f2f6;
      --muted: #8d91a3;
      --accent: #f1c232;
      --accentText: #111;
      --bot: #191c27;
      --user: #2a2615;
      --userLine: rgba(241,194,50,0.45);
      --radius: 14px;
      --safeBottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      height: 100dvh;
    }

    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 20% 0%, rgba(241,194,50,0.08), transparent 32%),
        linear-gradient(180deg, #101119 0%, #08090d 55%);
    }

    .header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 11, 16, 0.94);
      backdrop-filter: blur(12px);
    }

    .droid-icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: var(--accent);
      color: var(--accentText);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex: 0 0 auto;
    }

    .title-wrap {
      min-width: 0;
    }

    .title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.15;
    }

    .subtitle {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
    }

    .chat {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 18px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .message {
      width: fit-content;
      max-width: min(760px, 88vw);
      padding: 13px 15px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 15px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      text-align: left;
      align-self: flex-start;
      border: 1px solid var(--line);
      box-shadow: 0 8px 22px rgba(0,0,0,0.20);
    }

    .message.bot {
      background: var(--bot);
      border-top-left-radius: 5px;
    }

    .message.user {
      background: var(--user);
      border-color: var(--userLine);
      color: var(--text);
      border-top-left-radius: 5px;
    }

    .message a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .message a:hover {
      text-decoration: underline;
    }

    .image-card {
      width: fit-content;
      max-width: min(760px, 88vw);
      align-self: flex-start;
      padding: 12px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 8px 22px rgba(0,0,0,0.20);
    }

    .image-title {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 9px;
    }

    .image-card img {
      display: block;
      width: 100%;
      max-height: 520px;
      object-fit: contain;
      border-radius: 11px;
      background: #050609;
    }

    .image-caption {
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .status {
      flex: 0 0 auto;
      min-height: 20px;
      padding: 0 16px 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .input-wrap {
      flex: 0 0 auto;
      display: flex;
      gap: 10px;
      padding: 10px 12px calc(10px + var(--safeBottom));
      border-top: 1px solid var(--line);
      background: rgba(10, 11, 16, 0.96);
      backdrop-filter: blur(12px);
    }

    .input {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 46px;
      max-height: 130px;
      resize: none;
      border: 1px solid var(--line);
      outline: none;
      border-radius: 12px;
      padding: 12px 13px;
      background: var(--panel2);
      color: var(--text);
      font-size: 15px;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.35;
    }

    .input:focus {
      border-color: rgba(241,194,50,0.65);
    }

    .send {
      flex: 0 0 auto;
      width: 72px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: var(--accentText);
      font-weight: 800;
      cursor: pointer;
    }

    .send:active {
      transform: scale(0.98);
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 16px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 11, 16, 0.94);
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .chip:hover {
      border-color: rgba(241,194,50,0.65);
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .message,
      .image-card {
        max-width: 94vw;
      }

      .subtitle {
        display: none;
      }

      .send {
        width: 62px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="droid-icon">🤖</div>
      <div class="title-wrap">
        <div class="title">VF-CB</div>
        <div class="subtitle">Collector Companion Droid for vintage Star Wars figures and accessories</div>
      </div>
    </header>

    <div class="chips">
      <button class="chip" onclick="sendPreset('jawa')">Jawa figure</button>
      <button class="chip" onclick="sendPreset('jawa blaster')">Jawa blaster</button>
      <button class="chip" onclick="sendPreset('blaster')">Identify a blaster</button>
      <button class="chip" onclick="sendPreset('what does COO mean?')">What does COO mean?</button>
    </div>

    <main id="chat" class="chat"></main>

    <div id="status" class="status"></div>

    <footer class="input-wrap">
      <textarea id="input" class="input" rows="1" placeholder="Ask about figures, variants, COOs, cloaks or accessories..."></textarea>
      <button class="send" onclick="sendMessage()">Send</button>
    </footer>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const statusEl = document.getElementById("status");

    const state = {
      history: [],
      flowState: null
    };

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatText(text) {
      const escaped = escapeHtml(text);
      return escaped
        .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>')
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\n/g, "<br>");
    }

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function scrollToBottom() {
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = "message " + (role === "user" ? "user" : "bot");
      msg.innerHTML = formatText(text);
      chatEl.appendChild(msg);
      scrollToBottom();

      state.history.push({
        role: role === "user" ? "user" : "assistant",
        content: text
      });
    }

    function addImageCard(image) {
      if (!image || !image.url) return;

      const card = document.createElement("div");
      card.className = "image-card";

      if (image.title) {
        const title = document.createElement("div");
        title.className = "image-title";
        title.textContent = image.title;
        card.appendChild(title);
      }

      const img = document.createElement("img");
      img.src = image.url;
      img.alt = image.title || "VF-CB reference image";
      img.loading = "lazy";
      card.appendChild(img);

      if (image.caption) {
        const caption = document.createElement("div");
        caption.className = "image-caption";
        caption.innerHTML = formatText(image.caption);
        card.appendChild(caption);
      }

      chatEl.appendChild(card);
      scrollToBottom();
    }

    async function askApi(message) {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message,
          history: state.history.slice(-30),
          flowState: state.flowState
        })
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        throw new Error(data.error || "API error");
      }

      return data;
    }

    async function sendMessage(prefilledText) {
      const text = String(prefilledText || inputEl.value || "").trim();
      if (!text) return;

      addMessage("user", text);

      if (!prefilledText) {
        inputEl.value = "";
        autoSizeInput();
      }

      setStatus("VF-CB is checking the reference files...");

      try {
        const data = await askApi(text);

        state.flowState = data.flowState || null;

        if (Array.isArray(data.images)) {
          data.images.forEach(addImageCard);
        }

        addMessage("assistant", data.reply || "I could not find a useful answer from the reference files.");
      } catch (err) {
        console.error(err);
        addMessage("assistant", "Sorry, there was a problem getting an answer.");
      } finally {
        setStatus("");
      }
    }

    function sendPreset(text) {
      sendMessage(text);
    }

    function autoSizeInput() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + "px";
    }

    inputEl.addEventListener("input", autoSizeInput);

    inputEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    addMessage(
      "assistant",
      "Hello, I am VF-CB, the Vintage Figures Chat Bot. Fluent in collector's speak and knowledgeable across vintage Kenner Star Wars figures, variants and accessories. How may I help you today?"
    );
  </script>
</body>
</html>
