<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VF-CB | Vintage Figures Chat Bot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* HEADER */
    .header {
      padding: 15px 20px;
      background: #11121a;
      border-bottom: 1px solid #222;
      font-weight: bold;
      font-size: 16px;
    }

    /* CHAT AREA */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.4;
      font-size: 14px;
    }

    .bot {
      background: #1a1c26;
      align-self: flex-start;
    }

    .user {
      background: #f5c518;
      color: #000;
      align-self: flex-end;
    }

    /* INPUT AREA */
    .input-bar {
      display: flex;
      border-top: 1px solid #222;
      background: #11121a;
      padding: 10px;
    }

    .input-bar input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      background: #1a1c26;
      color: #fff;
      border-radius: 6px;
    }

    .input-bar button {
      margin-left: 10px;
      padding: 0 20px;
      border: none;
      background: #f5c518;
      color: #000;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .input-bar button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="header">
    VF-CB | Vintage Figures Chat Bot
  </div>

  <div id="chat" class="chat-container"></div>

  <div class="input-bar">
    <input id="input" type="text" placeholder="Ask about figures, variants, accessories..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    function addMessage(text, sender) {
      const msg = document.createElement("div");
      msg.className = "message " + sender;
      msg.innerText = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();

      addMessage(data.reply, "bot");
    }

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendMessage();
    });

    // Initial message
    addMessage(
      "Hello, I am VF-CB, the Vintage Figures Chat Bot. Fluent in collector's speak and knowledgeable across vintage Kenner Star Wars figures, variants and accessories. How may I help you today?",
      "bot"
    );
  </script>

</body>
</html>
